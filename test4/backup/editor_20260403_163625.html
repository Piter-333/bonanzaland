<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PNG Editor</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
    }

    .workspace {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .container {
      width: 1272px;
      height: 716px;
      background: url("map.png") center center / 100% 100% no-repeat;
      position: relative;
      overflow: hidden;
    }

    #editor-canvas {
      width: 1272px;
      height: 716px;
      display: block;
    }

    .panel {
      width: 245px;
      max-height: 716px;
      overflow: auto;
      background: rgba(255, 255, 255, 0.93);
      border-radius: 8px;
      padding: 10px;
      box-sizing: border-box;
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .row button,
    .row select,
    .row input {
      font-size: 13px;
    }

    .axis-row input[type="range"] {
      width: 100%;
    }

    .move-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 4px;
      width: 120px;
    }

    .move-grid button,
    .panel button {
      cursor: pointer;
    }

    .status {
      font-size: 12px;
      color: #222;
      min-height: 16px;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="workspace">
    <div class="panel">
      <div class="title">Добавить PNG</div>
      <div id="asset-buttons" class="row"></div>

      <div class="title">Выбор фигуры</div>
      <div class="row">
        <select id="sprite-select" style="min-width: 160px;"></select>
        <button id="delete-selected" type="button">Удалить</button>
      </div>

      <div class="title">Движение</div>
      <div class="row">
        <div class="move-grid">
          <span></span>
          <button data-action="move-up" type="button">↑</button>
          <span></span>
          <button data-action="move-left" type="button">←</button>
          <span></span>
          <button data-action="move-right" type="button">→</button>
          <span></span>
          <button data-action="move-down" type="button">↓</button>
          <span></span>
        </div>
        <label>Шаг <input id="step-input" type="number" min="1" max="100" value="5" style="width:56px;" /></label>
      </div>

      <div class="title">Поворот (X/Y/Z)</div>
      <div class="row axis-row">
        <button data-action="rot-x-neg" type="button">X-</button>
        <button data-action="rot-x-pos" type="button">X+</button>
        <label>X° <input id="rot-x-input" type="number" value="0" style="width:54px;" /></label>
        <input id="rot-x-range" type="range" min="-89" max="89" value="0" />
      </div>
      <div class="row axis-row">
        <button data-action="rot-y-neg" type="button">Y-</button>
        <button data-action="rot-y-pos" type="button">Y+</button>
        <label>Y° <input id="rot-y-input" type="number" value="0" style="width:54px;" /></label>
        <input id="rot-y-range" type="range" min="-89" max="89" value="0" />
      </div>
      <div class="row axis-row">
        <button data-action="rot-z-neg" type="button">Z-</button>
        <button data-action="rot-z-pos" type="button">Z+</button>
        <label>Z° <input id="rot-z-input" type="number" value="0" style="width:54px;" /></label>
        <input id="rot-z-range" type="range" min="-180" max="180" value="0" />
      </div>
      <div class="row">
        <label>Шаг° <input id="rot-step-input" type="number" min="1" value="2" style="width:54px;" /></label>
        <button id="apply-rotation" type="button">Ок</button>
        <button data-action="rot-reset" type="button">Сброс</button>
      </div>

      <div class="title">Слой</div>
      <div class="row">
        <button data-action="layer-back" type="button">Назад</button>
        <button data-action="layer-front" type="button">Вперед</button>
      </div>

      <div class="title">Размер</div>
      <div class="row">
        <button data-action="scale-down" type="button">-</button>
        <button data-action="scale-up" type="button">+</button>
        <label>% <input id="scale-input" type="number" value="100" style="width:64px;" /></label>
        <button id="apply-scale" type="button">Ок</button>
      </div>

      <div class="title">Координаты</div>
      <div class="row">
        <button id="copy-selected" type="button">Копировать выбранную</button>
        <button id="copy-all" type="button">Копировать все</button>
      </div>

      <div id="status" class="status"></div>
    </div>
    <div class="container">
      <canvas id="editor-canvas" width="1272" height="716"></canvas>
    </div>
  </div>

  <script>
    const WIDTH = 1272;
    const HEIGHT = 716;
    const DPR = Math.max(window.devicePixelRatio || 1, 1);

    const canvas = document.getElementById("editor-canvas");
    const ctx = canvas.getContext("2d", { alpha: true });

    canvas.width = Math.round(WIDTH * DPR);
    canvas.height = Math.round(HEIGHT * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";

    const status = document.getElementById("status");
    const assetButtons = document.getElementById("asset-buttons");
    const spriteSelect = document.getElementById("sprite-select");
    const stepInput = document.getElementById("step-input");
    const rotXInput = document.getElementById("rot-x-input");
    const rotYInput = document.getElementById("rot-y-input");
    const rotZInput = document.getElementById("rot-z-input");
    const rotXRange = document.getElementById("rot-x-range");
    const rotYRange = document.getElementById("rot-y-range");
    const rotZRange = document.getElementById("rot-z-range");
    const rotStepInput = document.getElementById("rot-step-input");
    const scaleInput = document.getElementById("scale-input");
    const deleteButton = document.getElementById("delete-selected");
    const copySelectedButton = document.getElementById("copy-selected");
    const copyAllButton = document.getElementById("copy-all");

    let spriteCounter = 0;
    let selectedId = null;
    const sprites = [];
    const assetFiles = [
      "1w.png",
      "bomb.png",
      "bonus.png",
      "dead.png",
      "dog.png",
      "doghouse.png",
      "finish.png",
      "fish.png",
      "gift.png",
      "gens.png",
      "island.png",
      "map.png",
      "mokr.png",
      "portal.png",
      "save.png",
      "skilz.png",
      "srart.png",
      "time.png",
      "zadanie.png",
      "zloy.png"
    ];

    function updateStatus(text) {
      status.textContent = text;
    }

    function getSelectedSprite() {
      return sprites.find((s) => s.id === selectedId) || null;
    }

    function redraw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      for (const s of sprites) {
        ctx.save();
        ctx.translate(s.x, s.y);
        const rotXRad = (s.rotationX * Math.PI) / 180;
        const rotYRad = (s.rotationY * Math.PI) / 180;
        const rotZRad = (s.rotationZ * Math.PI) / 180;

        const scaleYByX = Math.max(0.1, Math.cos(rotXRad));
        const scaleXByY = Math.max(0.1, Math.cos(rotYRad));

        ctx.rotate(rotZRad);
        ctx.scale(scaleXByY, scaleYByX);
        ctx.scale(s.scale, s.scale);
        ctx.drawImage(s.img, -s.img.width / 2, -s.img.height / 2);
        ctx.restore();
      }
    }

    function refreshSelect() {
      const current = selectedId;
      spriteSelect.innerHTML = "";

      for (const s of sprites) {
        const opt = document.createElement("option");
        opt.value = s.id;
        opt.textContent = `${s.label} (${s.id})`;
        spriteSelect.appendChild(opt);
      }

      if (!sprites.length) {
        selectedId = null;
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "Нет фигур";
        spriteSelect.appendChild(opt);
        rotXInput.value = "0";
        rotYInput.value = "0";
        rotZInput.value = "0";
        rotXRange.value = "0";
        rotYRange.value = "0";
        rotZRange.value = "0";
        scaleInput.value = "100";
        return;
      }

      const exists = sprites.some((s) => s.id === current);
      selectedId = exists ? current : sprites[sprites.length - 1].id;
      spriteSelect.value = selectedId;
      syncInputsWithSelected();
    }

    function syncInputsWithSelected() {
      const s = getSelectedSprite();
      if (!s) return;
      rotXInput.value = String(Math.round(s.rotationX));
      rotYInput.value = String(Math.round(s.rotationY));
      rotZInput.value = String(Math.round(s.rotationZ));
      rotXRange.value = String(Math.round(s.rotationX));
      rotYRange.value = String(Math.round(s.rotationY));
      rotZRange.value = String(Math.round(s.rotationZ));
      scaleInput.value = String(Math.round(s.scale * 100));
    }

    function candidatePaths(assetName) {
      return [assetName];
    }

    function loadImageAny(paths) {
      return new Promise((resolve, reject) => {
        function tryAt(index) {
          if (index >= paths.length) {
            reject(new Error("not found"));
            return;
          }
          const img = new Image();
          img.onload = () => resolve({ img, path: paths[index] });
          img.onerror = () => tryAt(index + 1);
          img.src = paths[index];
        }
        tryAt(0);
      });
    }

    async function addSprite(assetName) {
      try {
        const { img, path } = await loadImageAny(candidatePaths(assetName));
        const maxInitial = 110;
        const fit = Math.min(maxInitial / img.width, maxInitial / img.height, 1);
        const id = `spr${++spriteCounter}`;
        const label = assetName.replace(".png", "");

        sprites.push({
          id,
          label,
          asset: assetName,
          img,
          x: Math.round(WIDTH / 2),
          y: Math.round(HEIGHT / 2),
          rotationX: 0,
          rotationY: 0,
          rotationZ: 0,
          scale: fit
        });

        selectedId = id;
        refreshSelect();
        redraw();
        updateStatus(`Добавлено: ${label}` + (path === "srart.png" ? " (из srart.png)" : ""));
      } catch {
        updateStatus(`Не найден файл: ${assetName}`);
      }
    }

    function withSelected(fn) {
      const s = getSelectedSprite();
      if (!s) {
        updateStatus("Сначала выбери фигуру");
        return;
      }
      fn(s);
      syncInputsWithSelected();
      redraw();
    }

    function moveSelected(dx, dy) {
      withSelected((s) => {
        s.x = Math.round(s.x + dx);
        s.y = Math.round(s.y + dy);
      });
    }

    function rotateXSelected(delta) {
      withSelected((s) => {
        s.rotationX = Math.max(-89, Math.min(89, s.rotationX + delta));
      });
    }

    function rotateYSelected(delta) {
      withSelected((s) => {
        s.rotationY = Math.max(-89, Math.min(89, s.rotationY + delta));
      });
    }

    function rotateZSelected(delta) {
      withSelected((s) => {
        s.rotationZ += delta;
      });
    }

    function setRotationXYZ(x, y, z) {
      withSelected((s) => {
        s.rotationX = Math.max(-89, Math.min(89, x));
        s.rotationY = Math.max(-89, Math.min(89, y));
        s.rotationZ = z;
      });
    }

    function resetRotationXYZ() {
      withSelected((s) => {
        s.rotationX = 0;
        s.rotationY = 0;
        s.rotationZ = 0;
      });
    }

    function scaleSelected(multiplier) {
      withSelected((s) => {
        s.scale = (s.scale * 100 * multiplier) / 100;
      });
    }

    function setScalePercent(value) {
      withSelected((s) => {
        if (!Number.isFinite(value)) return;
        s.scale = value / 100;
      });
    }

    function deleteSelected() {
      const s = getSelectedSprite();
      if (!s) return;
      const idx = sprites.findIndex((x) => x.id === s.id);
      if (idx >= 0) sprites.splice(idx, 1);
      refreshSelect();
      redraw();
      updateStatus("Фигура удалена");
    }

    function moveLayerSelected(direction) {
      const s = getSelectedSprite();
      if (!s) {
        updateStatus("Сначала выбери фигуру");
        return;
      }
      const idx = sprites.findIndex((x) => x.id === s.id);
      if (idx < 0) return;

      if (direction === "front" && idx < sprites.length - 1) {
        const tmp = sprites[idx + 1];
        sprites[idx + 1] = sprites[idx];
        sprites[idx] = tmp;
      }

      if (direction === "back" && idx > 0) {
        const tmp = sprites[idx - 1];
        sprites[idx - 1] = sprites[idx];
        sprites[idx] = tmp;
      }

      redraw();
      refreshSelect();
      spriteSelect.value = selectedId;
      updateStatus(direction === "front" ? "Фигура на слой выше" : "Фигура на слой ниже");
    }

    async function copyText(text) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
      } catch {}

      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let ok = false;
      try {
        ok = document.execCommand("copy");
      } catch {
        ok = false;
      }
      document.body.removeChild(ta);
      return ok;
    }

    function selectedPayload() {
      const s = getSelectedSprite();
      if (!s) return null;
      return {
        id: s.id,
        asset: s.asset,
        x: Math.round(s.x),
        y: Math.round(s.y),
        rotationX: Number(s.rotationX.toFixed(2)),
        rotationY: Number(s.rotationY.toFixed(2)),
        rotationZ: Number(s.rotationZ.toFixed(2)),
        scale: Number(s.scale.toFixed(4))
      };
    }

    function allPayload() {
      return sprites.map((s, index) => ({
        id: s.id,
        asset: s.asset,
        x: Math.round(s.x),
        y: Math.round(s.y),
        rotationX: Number(s.rotationX.toFixed(2)),
        rotationY: Number(s.rotationY.toFixed(2)),
        rotationZ: Number(s.rotationZ.toFixed(2)),
        scale: Number(s.scale.toFixed(4)),
        zIndex: index
      }));
    }

    for (const file of assetFiles) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.dataset.asset = file;
      btn.textContent = file.replace(".png", "");
      btn.addEventListener("click", () => addSprite(file));
      assetButtons.appendChild(btn);
    }

    document.querySelectorAll("button[data-action]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const action = btn.dataset.action;
        const step = Math.max(1, Number(stepInput.value) || 5);
        const rotStep = Math.max(1, Number(rotStepInput.value) || 2);

        if (action === "move-up") moveSelected(0, -step);
        if (action === "move-down") moveSelected(0, step);
        if (action === "move-left") moveSelected(-step, 0);
        if (action === "move-right") moveSelected(step, 0);
        if (action === "rot-x-neg") rotateXSelected(-rotStep);
        if (action === "rot-x-pos") rotateXSelected(rotStep);
        if (action === "rot-y-neg") rotateYSelected(-rotStep);
        if (action === "rot-y-pos") rotateYSelected(rotStep);
        if (action === "rot-z-neg") rotateZSelected(-rotStep);
        if (action === "rot-z-pos") rotateZSelected(rotStep);
        if (action === "rot-reset") resetRotationXYZ();
        if (action === "layer-front") moveLayerSelected("front");
        if (action === "layer-back") moveLayerSelected("back");
        if (action === "scale-down") scaleSelected(0.95);
        if (action === "scale-up") scaleSelected(1.05);
      });
    });

    spriteSelect.addEventListener("change", () => {
      selectedId = spriteSelect.value || null;
      syncInputsWithSelected();
      updateStatus(selectedId ? `Выбрано: ${selectedId}` : "Нет выбора");
    });

    document.getElementById("apply-rotation").addEventListener("click", () => {
      setRotationXYZ(
        Number(rotXInput.value) || 0,
        Number(rotYInput.value) || 0,
        Number(rotZInput.value) || 0
      );
    });

    rotXRange.addEventListener("input", () => {
      const selected = getSelectedSprite();
      if (!selected) return;
      selected.rotationX = Number(rotXRange.value);
      syncInputsWithSelected();
      redraw();
    });

    rotYRange.addEventListener("input", () => {
      const selected = getSelectedSprite();
      if (!selected) return;
      selected.rotationY = Number(rotYRange.value);
      syncInputsWithSelected();
      redraw();
    });

    rotZRange.addEventListener("input", () => {
      const selected = getSelectedSprite();
      if (!selected) return;
      selected.rotationZ = Number(rotZRange.value);
      syncInputsWithSelected();
      redraw();
    });

    rotXInput.addEventListener("change", () => {
      const selected = getSelectedSprite();
      if (!selected) return;
      selected.rotationX = Math.max(-89, Math.min(89, Number(rotXInput.value) || 0));
      syncInputsWithSelected();
      redraw();
    });

    rotYInput.addEventListener("change", () => {
      const selected = getSelectedSprite();
      if (!selected) return;
      selected.rotationY = Math.max(-89, Math.min(89, Number(rotYInput.value) || 0));
      syncInputsWithSelected();
      redraw();
    });

    rotZInput.addEventListener("change", () => {
      const selected = getSelectedSprite();
      if (!selected) return;
      selected.rotationZ = Number(rotZInput.value) || 0;
      syncInputsWithSelected();
      redraw();
    });

    document.getElementById("apply-scale").addEventListener("click", () => {
      const value = Number(scaleInput.value);
      setScalePercent(value);
    });

    deleteButton.addEventListener("click", deleteSelected);

    copySelectedButton.addEventListener("click", async () => {
      const payload = selectedPayload();
      if (!payload) {
        updateStatus("Сначала выбери фигуру");
        return;
      }
      const ok = await copyText(JSON.stringify(payload, null, 2));
      updateStatus(ok ? "Координаты выбранной скопированы" : "Не удалось скопировать");
    });

    copyAllButton.addEventListener("click", async () => {
      const payload = allPayload();
      if (!payload.length) {
        updateStatus("Нет фигур для копирования");
        return;
      }
      const ok = await copyText(JSON.stringify(payload, null, 2));
      updateStatus(ok ? "Координаты всех фигур скопированы" : "Не удалось скопировать");
    });

    refreshSelect();
    redraw();
    updateStatus("Готово. Редактирование через левую панель.");
  </script>
</body>
</html>
