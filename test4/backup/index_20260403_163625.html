  <title>One Page</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 1536px;
      height: 1024px;
      transform: translateX(160px);
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      left: 0;
      top: 0;
      width: 1536px;
      height: 1024px;
      object-fit: fill;
      z-index: 0;
      pointer-events: none;
    }

    .dice-view {
      position: absolute;
      left: 624px;
      top: 340px;
      z-index: 300;
      width: 150px;
      height: 150px;
      transform: translate(-50%, -62%);
    }

    .chip-view {
      position: absolute;
      left: 1041px;
      top: 620px;
      z-index: 200;
      width: 102px;
      height: 102px;
      transform: translate(-50%, -104%);
      transition: left 280ms ease, top 280ms ease;
      pointer-events: none;
    }

    .placed-sprite {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: center center;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      backface-visibility: hidden;
      image-rendering: auto;
      will-change: transform;
    }

    .controls {
      position: absolute;
      left: 50%;
      bottom: 30px;
      z-index: 2;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>

    const host = document.getElementById("dice-view");
    const chipHost = document.getElementById("chip-view");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, host.clientWidth / host.clientHeight, 0.1, 10000);
    camera.position.set(0, 0, 260);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(host.clientWidth, host.clientHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    host.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);
    const directional = new THREE.DirectionalLight(0xffffff, 1);
    directional.position.set(120, 200, 100);
    scene.add(directional);
    const fill = new THREE.DirectionalLight(0xffffff, 0.6);
    fill.position.set(-120, -60, 140);
    scene.add(fill);

    const chipScene = new THREE.Scene();
    const chipCamera = new THREE.PerspectiveCamera(45, chipHost.clientWidth / chipHost.clientHeight, 0.1, 1000);
    chipCamera.position.set(0, 0.9, 3);
    chipCamera.lookAt(0, 0.9, 0);
    const chipRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    chipRenderer.setPixelRatio(window.devicePixelRatio);
    chipRenderer.setSize(chipHost.clientWidth, chipHost.clientHeight);
    chipRenderer.outputEncoding = THREE.sRGBEncoding;
    chipHost.appendChild(chipRenderer.domElement);
    const chipAmbient = new THREE.AmbientLight(0xffffff, 0.9);
    chipScene.add(chipAmbient);
    const chipDir = new THREE.DirectionalLight(0xffffff, 1.1);
    chipDir.position.set(2, 3, 4);
    chipScene.add(chipDir);

    let objectModel = null;
    const rollBtn = document.getElementById("roll-btn");
    const rollResult = document.getElementById("roll-result");
    let isRolling = false;
    let rollFramesLeft = 0;
    let isSettling = false;
    let settleT = 0;
    let settleFromQuat = null;
    let settleToQuat = null;
    let pendingFrontKey = "posZ";
    const angularVelocity = new THREE.Vector3(0, 0, 0);
    const frontPresets = {
      posZ: [0, 0, 0],
      negZ: [0, Math.PI, 0],
      posX: [0, -Math.PI / 2, 0],
      negX: [0, Math.PI / 2, 0],
      posY: [-Math.PI / 2, 0, 0],
      negY: [Math.PI / 2, 0, 0]
    };
    // Base island tilt: keep dice visually standing on island plane.
    const DICE_BASE_X = THREE.MathUtils.degToRad(16);
    const DICE_BASE_Y = THREE.MathUtils.degToRad(-2);
    const DICE_BASE_Z = THREE.MathUtils.degToRad(-7);
    const baseIslandQuat = new THREE.Quaternion().setFromEuler(
      new THREE.Euler(DICE_BASE_X, DICE_BASE_Y, DICE_BASE_Z)
    );

    function getFaceQuaternion(faceKey) {
      const [fx, fy, fz] = frontPresets[faceKey];
      const faceQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(fx, fy, fz));
      return baseIslandQuat.clone().multiply(faceQuat);
    }
    const frontAxisToValue = {
      posZ: 1,
      negZ: 6,
      posX: 2,
      negX: 5,
      posY: 3,
      negY: 4
    };
    const calibratedValueMap = {
      1: 5,
      2: 6,
      3: 4,
      4: 3,
      5: 1,
      6: 2
    };
    let chipModel = null;
    let chipSpinEnabled = true;
    const CHIP_Y_OFFSET = -2;

    function getFrontFaceKey(model) {
      const viewDir = new THREE.Vector3(0, 0, 1);
      const candidates = [
        { key: "posX", dir: new THREE.Vector3(1, 0, 0) },
        { key: "negX", dir: new THREE.Vector3(-1, 0, 0) },
        { key: "posY", dir: new THREE.Vector3(0, 1, 0) },
        { key: "negY", dir: new THREE.Vector3(0, -1, 0) },
        { key: "posZ", dir: new THREE.Vector3(0, 0, 1) },
        { key: "negZ", dir: new THREE.Vector3(0, 0, -1) }
      ];

      let bestKey = "posZ";
      let bestDot = -Infinity;

      for (const c of candidates) {
        const worldDir = c.dir.clone().applyQuaternion(model.quaternion);
        const dot = worldDir.dot(viewDir);
        if (dot > bestDot) {
          bestDot = dot;
          bestKey = c.key;
        }
      }

      return bestKey;
    }
    const loader = new THREE.FBXLoader();
    loader.load(
      "Dice.fbx",
      (model) => {
        model.traverse((child) => {
          if (child.isMesh) {
            const sourceMaterial = Array.isArray(child.material) ? child.material[0] : child.material;
            const sourceMap = sourceMaterial && sourceMaterial.map ? sourceMaterial.map : null;
            child.material = new THREE.MeshPhongMaterial({
              color: 0xffffff,
              map: sourceMap || null,
              side: THREE.DoubleSide
            });
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 90;
        const fitScale = targetSize / maxDim;

        model.position.sub(center);
        model.scale.setScalar(fitScale);
        // Front view: cube face looks toward the camera.
        model.quaternion.copy(getFaceQuaternion("posZ"));
        scene.add(model);
        objectModel = model;
        const rawValue = frontAxisToValue[getFrontFaceKey(model)];
        rollResult.textContent = String(calibratedValueMap[rawValue]);
      },
      undefined,
      (error) => {
        console.error("FBX load error:", error);
        rollResult.textContent = "Ошибка загрузки Dice.fbx";
      }
    );

    const gltfLoader = new THREE.GLTFLoader();
    gltfLoader.load(
      "chip.glb",
      (gltf) => {
        const model = gltf.scene;
        const initialBox = new THREE.Box3().setFromObject(model);
        const center = initialBox.getCenter(new THREE.Vector3());
        const size = initialBox.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const fitScale = 1.4 / maxDim;
        model.position.sub(center);
        model.scale.setScalar(fitScale);

        // Align model so its "feet" sit on the cell anchor line.
        const alignedBox = new THREE.Box3().setFromObject(model);
        model.position.y -= alignedBox.min.y;

        chipScene.add(model);
        chipModel = model;
      },
      undefined,
      (error) => {
        console.error("GLB load error:", error);
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      if (objectModel && isRolling) {
        objectModel.rotation.x += angularVelocity.x;
        objectModel.rotation.y += angularVelocity.y;
        objectModel.rotation.z += angularVelocity.z;
        angularVelocity.multiplyScalar(0.985);
        rollFramesLeft -= 1;

        if (rollFramesLeft <= 0 || angularVelocity.length() < 0.01) {
          isRolling = false;
          settleFromQuat = objectModel.quaternion.clone();
          settleToQuat = getFaceQuaternion(pendingFrontKey);
          isSettling = true;
          settleT = 0;
        }
      }

      if (objectModel && isSettling) {
        settleT = Math.min(1, settleT + 0.08);
        objectModel.quaternion.slerpQuaternions(settleFromQuat, settleToQuat, settleT);
        if (settleT >= 1) {
          isSettling = false;
          const rawValue = frontAxisToValue[getFrontFaceKey(objectModel)];
          rollResult.textContent = String(calibratedValueMap[rawValue]);
        }
      }

      if (chipModel && chipSpinEnabled) {
        chipModel.rotation.y += 0.02;
      }

      renderer.render(scene, camera);
      chipRenderer.render(chipScene, chipCamera);
    }
    animate();

    rollBtn.addEventListener("click", () => {
      if (!objectModel || isRolling || isSettling) return;
      rollResult.textContent = "...";
      const keys = Object.keys(frontPresets);
      pendingFrontKey = keys[Math.floor(Math.random() * keys.length)];
      angularVelocity.set(
        0.25 + Math.random() * 0.25,
        0.25 + Math.random() * 0.25,
        0.25 + Math.random() * 0.25
      );
      rollFramesLeft = 320 + Math.floor(Math.random() * 40);
      isRolling = true;
    });

    window.addEventListener("resize", () => {
      const w = host.clientWidth;
      const h = host.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);

      const cw = chipHost.clientWidth;
      const ch = chipHost.clientHeight;
      chipCamera.aspect = cw / ch;
      chipCamera.updateProjectionMatrix();
      chipRenderer.setSize(cw, ch);
    });

    // Move character to a new board cell center.
    function setChipCell(x, y) {
      chipHost.style.left = `${x}px`;
      chipHost.style.top = `${y + CHIP_Y_OFFSET}px`;
    }
    window.setChipCell = setChipCell;

    const allCells = Array.from(document.querySelectorAll(".placed-sprite"));
    const cellsByOrder = allCells
      .map((el, idx) => {
        const x = parseFloat(el.style.left || "0");
        const y = parseFloat(el.style.top || "0");
        const z = Number(el.style.zIndex || idx);
        const asset = (el.getAttribute("src") || "").toLowerCase();
        return { el, x, y, z, asset };
      })
      .sort((a, b) => a.z - b.z);

    const startOrderIndex = cellsByOrder.findIndex((c) => c.asset === "srart.png");
    const finishOrderIndex = cellsByOrder.findIndex((c) => c.asset === "finish.png");
    const pathCells =
      startOrderIndex >= 0 && finishOrderIndex >= 0 && finishOrderIndex >= startOrderIndex
        ? cellsByOrder.slice(startOrderIndex, finishOrderIndex + 1)
        : [];

    pathCells.forEach((c, i) => {
      c.el.dataset.pathIndex = String(i);
    });

    let chipPathIndex = 0;
    let chipMoving = false;
    let chipMoveQueuedIndex = null;

    if (pathCells.length) {
      setChipCell(pathCells[0].x, pathCells[0].y);
    }

    function waitChipTransition() {
      return new Promise((resolve) => {
        const onEnd = () => {
          chipHost.removeEventListener("transitionend", onEnd);
          resolve();
        };
        chipHost.addEventListener("transitionend", onEnd, { once: true });
        setTimeout(() => {
          chipHost.removeEventListener("transitionend", onEnd);
          resolve();
        }, 320);
      });
    }

    async function moveChipToPathIndex(targetIndex) {
      if (!pathCells.length) return;
      const clamped = Math.max(0, Math.min(pathCells.length - 1, targetIndex));
      if (chipMoving) {
        chipMoveQueuedIndex = clamped;
        return;
      }

      chipMoving = true;
      const direction = clamped >= chipPathIndex ? 1 : -1;

      while (chipPathIndex !== clamped) {
        chipPathIndex += direction;
        const next = pathCells[chipPathIndex];
        setChipCell(next.x, next.y);
        await waitChipTransition();
      }

      chipMoving = false;
      if (chipMoveQueuedIndex !== null && chipMoveQueuedIndex !== chipPathIndex) {
        const queued = chipMoveQueuedIndex;
        chipMoveQueuedIndex = null;
        moveChipToPathIndex(queued);
      } else {
        chipMoveQueuedIndex = null;
      }
    }

    window.moveChipToStep = (stepIndex) => {
      moveChipToPathIndex(Number(stepIndex) || 0);
    };

    allCells.forEach((cell) => {
      cell.addEventListener("click", () => {
        const idx = Number(cell.dataset.pathIndex);
        if (Number.isFinite(idx)) {
          moveChipToPathIndex(idx);
        }
      });
    });

    // Match sprite rendering with editor.html (pseudo-3D for X/Y and Z-spin on 2D plane).
    function parseNumber(str, fallback = 0) {
      const n = Number(str);
      return Number.isFinite(n) ? n : fallback;
    }

    function normalizeSpriteRender(img) {
      const style = img.style.transform || "";
      const rxMatch = style.match(/rotateX\(([-\d.]+)deg\)/i);
      const ryMatch = style.match(/rotateY\(([-\d.]+)deg\)/i);
      const rzMatch = style.match(/rotateZ\(([-\d.]+)deg\)/i);
      const scaleMatch = style.match(/scale\(([-\d.]+)\)/i);

      const rx = parseNumber(rxMatch && rxMatch[1], 0);
      const ry = parseNumber(ryMatch && ryMatch[1], 0);
      const rz = parseNumber(rzMatch && rzMatch[1], 0);
      const baseScale = parseNumber(scaleMatch && scaleMatch[1], 1);

      const rxRad = (rx * Math.PI) / 180;
      const ryRad = (ry * Math.PI) / 180;
      const sx = Math.max(0.1, Math.cos(ryRad)) * baseScale;
      const sy = Math.max(0.1, Math.cos(rxRad)) * baseScale;
      const shiftX = Math.sin(ryRad) * 0.18 * img.naturalWidth * baseScale;
      const shiftY = Math.sin(rxRad) * 0.18 * img.naturalHeight * baseScale;

      img.style.transform =
        `translate(-50%, -50%) translate(${shiftX}px, ${shiftY}px) rotate(${rz}deg) scale(${sx}, ${sy})`;
    }

    function initSpritesRender() {
      document.querySelectorAll(".placed-sprite").forEach((img) => {
        if (img.complete) {
          normalizeSpriteRender(img);
        } else {
          img.addEventListener("load", () => normalizeSpriteRender(img), { once: true });
        }
      });
    }

    initSpritesRender();
  </script>
</body>
</html>
